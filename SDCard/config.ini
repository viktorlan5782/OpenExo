;Board information
;ALL FIELDS SHOULD BE LESS THAN 25 CHAR
[Board]
	;NEEDS TO BE SET IN "Config.h" PRIOR TO FLASHING TO TEENSY & NANO
	;Select one of the available board names (see list in Config.h)
	;Define the board versi\on in "BOARD_VERSION" slot immedietly after the list

[Exo]
	;configration names: Hip, Knee, Ankle, Elbow, HipAnkle, HipElbow, AnkleElbow, Arm
	;backward compatible: bilateralHip, bilateralKnee, bilateralAnkle, bilateralElbow, bilateralHipAnkle, bilateralHipElbow, bilateralAnkleElbow, bilateralArm
	name = Hip
	
	;Sides - left, right, bilateral
	sides = bilateral

	;Joints used and their motor name, 0 = joint not useed, AK60, AK60v1.1, AK60v3, AK70, are AK80 the different CAN motors.
	;Adding motors: PDA08, PDA01;
	;Secondary reduction DR Motor pending add
    ;Values 0(joint NOT used), NullMotor (joint IS used, no motors attached), AK60, AK60v1.1, AK60v3, AK70, AK80, AK45_36, AK45_10, MaxonMotor, PDA08, PDA01
	hip = PDA08
	knee = 0
	ankle = 0
	elbow = 0
	arm_1 = 0
	arm_2 = 0
    
    ;Joint gear ratio = velocity of driving member (motor)/velocity of the driven member (output shaft), assumes constant gearing ratio. If the motor spins 6 revolutions to 1 revolution of the output this value would be 6.
    ;This is for transmission gearing after the motor output shaft. If the Motor has a built in gearing that should be part of the motor class (see motor.h/.cpp)
    ;Values 1, 2, 3, 4.5
	hipGearRatio = 1
	kneeGearRatio = 1
	ankleGearRatio = 1
	elbowGearRatio = 1
	arm_1GearRatio = 1
	arm_2GearRatio = 1

	;Default controller for the joint
	;Hip Controllers: zeroTorque, franksCollinsHip, constantTorque, chirp, step, spline, phmc, calibrManager
	;Knee Controllers: zeroTorque, constantTorque, chirp, step, calibrManager
	;Ankle Controllers: zeroTorque, PJMC, zhangCollins, constantTorque, TREC, calibrManager, chirp, step, splin, SPV2, PJMC_PLUS
	;Elbow Controllers: zeroTorque, elbowMinMax, calibrManager, chirp, step
	;Arm 1 Controllers: constantTorque, spline
	;Arm 2 Controllers: constantTorque, spline
	hipDefaultController = step
	kneeDefaultController = 0
	ankleDefaultController = 0
	elbowDefaultController = 0
	arm_1DefaultController = 0
	arm_2DefaultController = 0
    
    ;Do you want to use a torque sensor for these joints, 0 = no, yes = yes
	hipUseTorqueSensor = 0
	kneeUseTorqueSensor = 0
	ankleUseTorqueSensor = yes
	elbowUseTorqueSensor = 0
	arm_1UseTorqueSensor = 0
	arm_2UseTorqueSensor = 0

	;Flip direction for the motor cmd, 0 neither, left, right, both
	hipFlipMotorDir = 0
	kneeFlipMotorDir = 0
	ankleFlipMotorDir = 0
	elbowFlipMotorDir = 0
	arm_1FlipMotorDir = 0
	arm_2FlipMotorDir = 0

	;Flip direction for the torque sensor readings, 0 neither, left, right, both
	hipFlipTorqueDir = 0
	kneeFlipTorqueDir = 0
	ankleFlipTorqueDir = 0
	elbowFlipTorqueDir = 0
	arm_1FlipTorqueDir = 0
	arm_2FlipTorqueDir = 0

	;Flip direction for the angle sensor readings, 0 neither, left, right, both
	hipFlipAngleDir = 0
	kneeFlipAngleDir = 0
	ankleFlipAngleDir = 0
	elbowFlipAngleDir = 0
	arm_1FlipAngleDir = 0
	arm_2FlipAngleDir = 0
	
	;Exoskeleton joint range of motion in degrees
	leftHipRoM = 0
	rightHipRoM = 0
	leftKneeRoM = 0
	rightKneeRoM = 0
	leftAnkleRoM = 0
	rightAnkleRoM = 0
	leftElbowRoM = 0
	rightElbowRoM = 0
	leftArm1RoM = 0
	rightArm1RoM = 0
	leftArm2RoM = 0
	rightArm2RoM = 0
	
	;Torque sensor calibration results, a value of "255" leads to the calibration value being utilizied
	leftHipTorqueOffset = 255
	rightHipTorqueOffset = 255
	leftKneeTorqueOffset = 255
	rightKneeTorqueOffset = 255
	leftAnkleTorqueOffset = 255
	rightAnkleTorqueOffset = 255
	leftElbowTorqueOffset = 255
	rightElbowTorqueOffset = 255
	leftArm1TorqueOffset = 255
	rightArm1TorqueOffset = 255
	leftArm2TorqueOffset = 255
	rightArm2TorqueOffset = 255

[PDA]
    ;PDA CAN IDs must be unique on the same CAN bus. Valid range: 1-63.
    ;Torque limits are continuous command saturation in Nm. Speed limits are rpm.
    ;Control modes: torque_direct, torque_ramp, speed, position, adaptive_position, impedance, motion_aid.
    leftHipPdaCanId = 1
    rightHipPdaCanId = 3
    leftKneePdaCanId = 2
    rightKneePdaCanId = 4
    leftAnklePdaCanId = 5
    rightAnklePdaCanId = 6
    leftElbowPdaCanId = 7
    rightElbowPdaCanId = 8
    leftArm1PdaCanId = 9
    rightArm1PdaCanId = 10
    leftArm2PdaCanId = 11
    rightArm2PdaCanId = 12

    leftHipPdaTorqueLimitNm = 8
    rightHipPdaTorqueLimitNm = 8
    leftKneePdaTorqueLimitNm = 8
    rightKneePdaTorqueLimitNm = 8
    leftAnklePdaTorqueLimitNm = 8
    rightAnklePdaTorqueLimitNm = 8
    leftElbowPdaTorqueLimitNm = 8
    rightElbowPdaTorqueLimitNm = 8
    leftArm1PdaTorqueLimitNm = 8
    rightArm1PdaTorqueLimitNm = 8
    leftArm2PdaTorqueLimitNm = 8
    rightArm2PdaTorqueLimitNm = 8

    leftHipPdaSpeedLimitRpm = 524
    rightHipPdaSpeedLimitRpm = 524
    leftKneePdaSpeedLimitRpm = 524
    rightKneePdaSpeedLimitRpm = 524
    leftAnklePdaSpeedLimitRpm = 524
    rightAnklePdaSpeedLimitRpm = 524
    leftElbowPdaSpeedLimitRpm = 524
    rightElbowPdaSpeedLimitRpm = 524
    leftArm1PdaSpeedLimitRpm = 524
    rightArm1PdaSpeedLimitRpm = 524
    leftArm2PdaSpeedLimitRpm = 524
    rightArm2PdaSpeedLimitRpm = 524

    leftHipPdaControlMode = torque_direct
    rightHipPdaControlMode = torque_direct
    leftKneePdaControlMode = torque_direct
    rightKneePdaControlMode = torque_direct
    leftAnklePdaControlMode = torque_direct
    rightAnklePdaControlMode = torque_direct
    leftElbowPdaControlMode = torque_direct
    rightElbowPdaControlMode = torque_direct
    leftArm1PdaControlMode = torque_direct
    rightArm1PdaControlMode = torque_direct
    leftArm2PdaControlMode = torque_direct
    rightArm2PdaControlMode = torque_direct
